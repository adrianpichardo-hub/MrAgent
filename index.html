<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Despacho de Nueva Palmira - Monkey Island Style</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🎮</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff;
        }

        .game-wrapper {
            width: 100%;
            max-width: 1200px;
            padding: 10px;
        }

        .game-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #1a1a1a;
            border: 4px solid #4a4a4a;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            cursor: pointer;
        }

        .ui-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            border-top: 2px solid #4a4a4a;
            padding: 15px;
            max-height: 30%;
            overflow-y: auto;
            font-size: 11px;
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
            z-index: 10;
        }

        .dialog-text {
            margin-bottom: 10px;
            line-height: 1.5;
            min-height: 30px;
        }

        .dialog-options {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .dialog-option {
            background: #2a2a2a;
            border: 1px solid #00ff00;
            padding: 6px;
            cursor: pointer;
            transition: all 0.2s;
            color: #00ff00;
            font-size: 10px;
        }

        .dialog-option:hover {
            background: #00ff00;
            color: #000;
            text-shadow: none;
        }

        .inventory-bar {
            position: absolute;
            bottom: 5px;
            left: 10px;
            display: flex;
            gap: 8px;
            z-index: 15;
        }

        .inventory-item {
            width: 50px;
            height: 50px;
            border: 2px solid #4a4a4a;
            background: #2a2a2a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            text-align: center;
            transition: all 0.3s;
        }

        .inventory-item.active {
            border-color: #00ff00;
            box-shadow: 0 0 10px #00ff00;
            background: #1a3a1a;
        }

        .status-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ff00;
            padding: 8px;
            font-size: 10px;
            z-index: 5;
        }

        .status-text {
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
            margin: 2px 0;
        }

        .sound-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 10px;
            z-index: 5;
        }

        .sound-toggle:hover {
            background: #00ff00;
            color: #000;
        }

        .victory-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }

        .victory-overlay.show {
            display: flex;
        }

        .victory-title {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffff00;
            text-shadow: 0 0 20px #ff0000;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .victory-text {
            font-size: 14px;
            margin: 8px 0;
        }

        .victory-stats {
            margin-top: 20px;
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #00ff00;
            padding: 15px;
            text-align: left;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .dialog-text { font-size: 9px; }
            .dialog-option { font-size: 8px; }
            .status-bar { font-size: 8px; }
            .sound-toggle { font-size: 8px; }
            .inventory-item { width: 40px; height: 40px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-container">
            <canvas id="gameCanvas"></canvas>
            
            <div class="status-bar">
                <div class="status-text">LOC: <span id="locStatus">INTRO</span></div>
                <div class="status-text">CRISTHIAN Q</div>
            </div>

            <div class="sound-toggle" id="soundToggle">🔊 ON</div>

            <div class="inventory-bar" id="inventoryBar">
                <div class="inventory-item" id="inv-0">📄</div>
                <div class="inventory-item" id="inv-1">🖋️</div>
                <div class="inventory-item" id="inv-2">📋</div>
                <div class="inventory-item" id="inv-3">🔏</div>
            </div>

            <div class="ui-bottom">
                <div class="dialog-text" id="dialogText">Cargando juego...</div>
                <div class="dialog-options" id="dialogOptions"></div>
            </div>

            <div class="victory-overlay" id="victoryOverlay">
                <div class="victory-title">¡¡VICTORIA!!</div>
                <div class="victory-text">El buque despachado correctamente</div>
                <div class="victory-stats" id="victoryStats"></div>
                <div class="victory-text" style="margin-top: 20px;">Presiona R para reiniciar</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // AUDIO SYSTEM (Safe, Non-Blocking)
        // ============================================================
        let audioCtx = null;
        let soundEnabled = true;
        let audioReady = false;

        function initAudio() {
            if (!audioCtx && !audioReady) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    audioReady = true;
                } catch (e) {
                    audioReady = true; // Mark as tried, don't retry
                }
            }
        }

        function playSound(freq, dur, type = 'sine', vol = 0.2) {
            if (!soundEnabled || !audioCtx) return;
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + dur);
                osc.start(now);
                osc.stop(now + dur);
            } catch (e) { }
        }

        const sounds = {
            select: () => playSound(800, 0.08),
            getItem: () => {
                playSound(523, 0.1);
                setTimeout(() => playSound(659, 0.1), 100);
                setTimeout(() => playSound(784, 0.12), 200);
            },
            slap: () => {
                playSound(150, 0.05, 'square', 0.4);
                playSound(100, 0.08, 'square', 0.3);
            },
            door: () => {
                playSound(400, 0.15);
                playSound(350, 0.15);
            },
            victory: () => {
                playSound(523, 0.1);
                setTimeout(() => playSound(659, 0.1), 100);
                setTimeout(() => playSound(784, 0.1), 200);
                setTimeout(() => playSound(1047, 0.2), 300);
            }
        };

        document.getElementById('soundToggle').addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            document.getElementById('soundToggle').textContent = soundEnabled ? '🔊 ON' : '🔇 OFF';
            initAudio();
        });

        // ============================================================
        // CANVAS SETUP
        // ============================================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ============================================================
        // GAME STATE
        // ============================================================
        const gameState = {
            location: 'intro',
            introPhase: 0,
            items: [false, false, false, false],
            npcVisited: [false, false, false, false, false, false],
            cachetazos: 0,
            dialogos: 0,
            miniJuegos: 0,
            startTime: Date.now(),
            gameWon: false
        };

        // ============================================================
        // DIALOGS DATABASE
        // ============================================================
        const dialogs = {
            intro: {
                text: "🔊 PRÁCTICO: Atención Control Palmira...\n\nAqui Práctico Chiarelli. En 5 minutos fondeamos en Rada Nueva Palmira.\n\n[Haz CLICK para continuar...]",
                options: []
            },
            intro2: {
                text: "🔊 PRÁCTICO: Autorización para operaciones de descarga mineral en Terminal Navios...\n\n[Pausa de tensión...]",
                options: []
            },
            monologue: {
                text: "CRISTHIAN (monólogo): El Capitán confía en mí... Solo necesito que Migraciones firme, luego Prefectura, imprimir en Oficina, y finalmente Aduana.\n\n¿Qué tan difícil puede ser?",
                options: [{ text: "> Comenzar", next: 'mapa' }]
            },
            mapa: {
                text: "Estoy en el muelle de Nueva Palmira. Veo 6 locaciones. ¿Dónde voy?",
                options: []
            },
            migr_init: {
                text: "OFICIAL GÓMEZ: ¡Bienvenido a Migraciones! Necesitás el documento de entrada?",
                options: [{ text: "> Sí, por favor", next: 'migr_doc' }]
            },
            migr_doc: {
                text: "GÓMEZ: Aquí está. Sin esto no entras a ningún lado.\n\n⚠️ ADVERTENCIA: Mi compañera te dará un cachetazo si la ves sin esto.",
                options: [{ text: "> Gracias", next: 'mapa', action: 0 }]
            },
            pref_nodoc: {
                text: "❌ ¡¡OFICIAL MALHUMORADA!!\n[PLAAACK!!!]\n\n¡¡SIN DOCUMENTO DE MIGRACIONES NO ENTRA NADIE!",
                options: []
            },
            pref_doc: {
                text: "CAPITÁN LÓPEZ: El documento está en orden... Aquí va la autorización.",
                options: [{ text: "> Gracias", next: 'mapa', action: 1 }]
            },
            ofic_noauth: {
                text: "❌ ¡¡OFICIAL MALHUMORADA (FURIOSA)!!\n[PLAAACK x2!!!]\n\n¡¡PRIMERO AUTORIZACIÓN, DESPUÉS IMPRIMO!",
                options: []
            },
            ofic_minigame: {
                text: "EMPLEADA MARTINA: ¿Qué imprimimos?",
                options: [
                    { text: "1. Despacho oficial", next: 'ofic_win', action: 2 },
                    { text: "2. Carta de amor", next: 'ofic_lose' },
                    { text: "3. Receta de bizcochos", next: 'ofic_lose' }
                ]
            },
            ofic_lose: {
                text: "MARTINA: ¡¡Eso NO se imprime!!",
                options: [
                    { text: "1. Despacho oficial", next: 'ofic_win', action: 2 },
                    { text: "2. Carta de amor", next: 'ofic_lose' },
                    { text: "3. Receta de bizcochos", next: 'ofic_lose' }
                ]
            },
            ofic_win: {
                text: "MARTINA: ¡¡CORRECTO!! Aquí está tu despacho.",
                options: [{ text: "> Gracias", next: 'mapa', action: 2 }]
            },
            adu_init: {
                text: "INSPECTOR RODRÍGUEZ: Ese despacho... ¿es AUTÉNTICO? Huele a fraude...",
                options: [{ text: "> ¡Es legítimo!", next: 'adu_seal', action: 3 }]
            },
            adu_seal: {
                text: "RODRÍGUEZ: El sello... ES PODER.\n\n✅ ¡¡VICTORIA!! El buque ha sido despachado.",
                options: []
            },
            puerto_anp: {
                text: "MARINERO: ¿Qué mirás? Este buque pesa 50 mil toneladas. Una BESTIA.",
                options: [{ text: "> Interesante", next: 'mapa' }]
            },
            terminal: {
                text: "SUPERVISOR: ¿Cuántas toneladas pesa el buque?",
                options: [
                    { text: "1. 50.000 toneladas", next: 'mapa' },
                    { text: "2. 3.000 toneladas", next: 'mapa' },
                    { text: "3. 100 toneladas", next: 'mapa' }
                ]
            }
        };

        // ============================================================
        // GAME FUNCTIONS
        // ============================================================
        function updateInventory() {
            const items = document.querySelectorAll('.inventory-item');
            items.forEach((el, i) => {
                if (gameState.items[i]) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });
        }

        function showDialog(key) {
            const d = dialogs[key];
            if (!d) return;

            document.getElementById('dialogText').textContent = d.text;
            const opts = document.getElementById('dialogOptions');
            opts.innerHTML = '';

            if (d.options.length) {
                d.options.forEach(opt => {
                    const btn = document.createElement('div');
                    btn.className = 'dialog-option';
                    btn.textContent = opt.text;
                    btn.onclick = () => {
                        sounds.select();
                        if (opt.action !== undefined) {
                            gameState.items[opt.action] = true;
                            gameState.dialogos++;
                            sounds.getItem();
                        }
                        if (opt.next) {
                            if (opt.next === 'mapa') {
                                goToLocation('mapa');
                            } else {
                                showDialog(opt.next);
                            }
                        }
                    };
                    opts.appendChild(btn);
                });
            } else {
                setTimeout(() => {
                    if (key === 'intro') {
                        gameState.introPhase = 1;
                        showDialog('intro2');
                    } else if (key === 'intro2') {
                        gameState.introPhase = 2;
                        showDialog('monologue');
                    } else if (key === 'pref_nodoc') {
                        gameState.cachetazos++;
                        setTimeout(() => goToLocation('mapa'), 2000);
                    } else if (key === 'ofic_noauth') {
                        gameState.cachetazos++;
                        setTimeout(() => goToLocation('mapa'), 2000);
                    } else if (key === 'adu_seal') {
                        gameState.gameWon = true;
                        showVictory();
                    }
                }, 2000);
            }

            updateInventory();
        }

        function goToLocation(loc) {
            gameState.location = loc;
            document.getElementById('locStatus').textContent = loc.toUpperCase();
            sounds.door();

            if (loc === 'intro') {
                showDialog('intro');
            } else if (loc === 'mapa') {
                showDialog('mapa');
            } else if (loc === 'migraciones') {
                if (!gameState.npcVisited[0]) {
                    gameState.npcVisited[0] = true;
                    showDialog('migr_init');
                } else {
                    showDialog('mapa');
                }
            } else if (loc === 'prefectura') {
                if (!gameState.items[0]) {
                    gameState.cachetazos++;
                    showDialog('pref_nodoc');
                } else if (!gameState.npcVisited[1]) {
                    gameState.npcVisited[1] = true;
                    showDialog('pref_doc');
                } else {
                    showDialog('mapa');
                }
            } else if (loc === 'oficina') {
                if (!gameState.items[1]) {
                    gameState.cachetazos++;
                    showDialog('ofic_noauth');
                } else if (!gameState.npcVisited[2]) {
                    gameState.npcVisited[2] = true;
                    showDialog('ofic_minigame');
                } else {
                    showDialog('mapa');
                }
            } else if (loc === 'aduana') {
                if (!gameState.items[2]) {
                    showDialog('mapa');
                } else if (!gameState.npcVisited[3]) {
                    gameState.npcVisited[3] = true;
                    showDialog('adu_init');
                } else {
                    showDialog('mapa');
                }
            } else if (loc === 'puerto_anp') {
                gameState.npcVisited[4] = true;
                showDialog('puerto_anp');
            } else if (loc === 'terminal_navios') {
                gameState.npcVisited[5] = true;
                gameState.miniJuegos++;
                showDialog('terminal');
            }
        }

        function showVictory() {
            const time = Math.floor((Date.now() - gameState.startTime) / 1000);
            const mins = Math.floor(time / 60);
            const secs = time % 60;

            document.getElementById('victoryStats').innerHTML = `
                <div class="status-text">Cachetazos: ${gameState.cachetazos}</div>
                <div class="status-text">Diálogos: ${gameState.dialogos}</div>
                <div class="status-text">Mini-juegos: ${gameState.miniJuegos}</div>
                <div class="status-text">Tiempo: ${mins}m ${secs}s</div>
            `;

            document.getElementById('victoryOverlay').classList.add('show');
            sounds.victory();
        }

        // ============================================================
        // CANVAS DRAWING
        // ============================================================
        function drawIntro() {
            ctx.fillStyle = '#1a3a5a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Puente del buque (ventanas)
            ctx.fillStyle = '#87ceeb';
            ctx.fillRect(canvas.width * 0.1, 20, 60, 50);
            ctx.fillRect(canvas.width * 0.3, 20, 60, 50);
            ctx.fillRect(canvas.width * 0.5, 20, 60, 50);
            ctx.fillRect(canvas.width * 0.7, 20, 60, 50);

            // Panel de control
            ctx.fillStyle = '#4a4a4a';
            ctx.fillRect(canvas.width * 0.15, canvas.height * 0.35, canvas.width * 0.7, canvas.height * 0.35);

            // Luces
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(canvas.width * 0.2, canvas.height * 0.45, 6, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.arc(canvas.width * 0.3, canvas.height * 0.45, 6, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(canvas.width * 0.4, canvas.height * 0.45, 6, 0, Math.PI * 2);
            ctx.fill();

            // Práctico (cabeza GRANDE)
            const practicoX = canvas.width * 0.5;
            const practicoY = canvas.height * 0.55;

            // Cabeza
            ctx.fillStyle = '#ffdbac';
            ctx.beginPath();
            ctx.arc(practicoX, practicoY - 30, 20, 0, Math.PI * 2);
            ctx.fill();

            // Gorro/pelo
            ctx.fillStyle = '#333333';
            ctx.beginPath();
            ctx.arc(practicoX, practicoY - 45, 22, 0, Math.PI);
            ctx.fill();

            // Ojos
            ctx.fillStyle = '#000000';
            ctx.fillRect(practicoX - 12, practicoY - 30, 4, 4);
            ctx.fillRect(practicoX + 8, practicoY - 30, 4, 4);

            // Boca (abierta - animada)
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(practicoX, practicoY - 18, 7, 0, Math.PI);
            ctx.stroke();

            // Micrófono
            ctx.fillStyle = '#cccccc';
            ctx.fillRect(practicoX + 30, practicoY - 30, 15, 40);
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(practicoX + 37, practicoY - 35, 8, 0, Math.PI * 2);
            ctx.fill();

            // Uniforme
            ctx.fillStyle = '#1a1a5a';
            ctx.fillRect(practicoX - 20, practicoY - 10, 40, 30);
        }

        function drawMap() {
            ctx.fillStyle = '#8B7355';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#4a7fa7';
            ctx.fillRect(0, canvas.height * 0.6, canvas.width, canvas.height * 0.4);

            // Faro
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(canvas.width * 0.85, 30, 20, 100);
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(canvas.width * 0.95, 20, 10, 0, Math.PI * 2);
            ctx.fill();

            // Puertas (6)
            const doors = [
                { x: 0.15, y: 0.35, name: 'MIGR', loc: 'migraciones' },
                { x: 0.4, y: 0.35, name: 'PREF', loc: 'prefectura' },
                { x: 0.65, y: 0.35, name: 'OFIC', loc: 'oficina' },
                { x: 0.5, y: 0.55, name: 'ADU', loc: 'aduana' },
                { x: 0.1, y: 0.15, name: 'PUERTO', loc: 'puerto_anp' },
                { x: 0.8, y: 0.2, name: 'TERM', loc: 'terminal_navios' }
            ];

            doors.forEach(d => {
                ctx.fillStyle = '#8B4513';
                const dx = canvas.width * d.x;
                const dy = canvas.height * d.y;
                ctx.fillRect(dx - 20, dy - 35, 40, 70);
                ctx.strokeStyle = '#654321';
                ctx.lineWidth = 2;
                ctx.strokeRect(dx - 20, dy - 35, 40, 70);
                ctx.fillStyle = '#ffff00';
                ctx.font = '10px Courier';
                ctx.textAlign = 'center';
                ctx.fillText(d.name, dx, dy);
            });

            // Personaje
            drawCharacter(canvas.width * 0.5, canvas.height * 0.7);
        }

        function drawLocation(locName, npcName) {
            const colors = {
                'migraciones': '#5a5a5a',
                'prefectura': '#4a4a6a',
                'oficina': '#6a6a4a',
                'aduana': '#3a3a5a',
                'puerto_anp': '#4a7fa7',
                'terminal_navios': '#6a4a3a'
            };

            ctx.fillStyle = colors[locName] || '#5a5a5a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ffff00';
            ctx.font = 'bold 16px Courier';
            ctx.textAlign = 'center';
            ctx.fillText(locName.toUpperCase(), canvas.width / 2, 40);

            // Isometric effect (z-plane)
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0, canvas.height * 0.5, canvas.width, canvas.height * 0.5);

            drawCharacter(canvas.width * 0.25, canvas.height * 0.55);
            drawNPC(canvas.width * 0.75, canvas.height * 0.55, npcName);
        }

        function drawCharacter(x, y) {
            // Cabeza
            ctx.fillStyle = '#ffdbac';
            ctx.beginPath();
            ctx.arc(x, y - 25, 8, 0, Math.PI * 2);
            ctx.fill();

            // Ojos
            ctx.fillStyle = '#000000';
            ctx.fillRect(x - 4, y - 27, 2, 2);
            ctx.fillRect(x + 2, y - 27, 2, 2);

            // Cuerpo
            ctx.fillStyle = '#1a3a7a';
            ctx.fillRect(x - 8, y - 17, 16, 14);

            // Brazos
            ctx.fillRect(x - 10, y - 12, 4, 10);
            ctx.fillRect(x + 6, y - 12, 4, 10);

            // Piernas
            ctx.fillRect(x - 4, y - 3, 3, 10);
            ctx.fillRect(x + 1, y - 3, 3, 10);
        }

        function drawNPC(x, y, name) {
            ctx.fillStyle = '#ffdbac';
            ctx.beginPath();
            ctx.arc(x, y - 25, 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x - 8, y - 17, 16, 14);

            ctx.fillStyle = '#ffff00';
            ctx.font = '9px Courier';
            ctx.textAlign = 'center';
            ctx.fillText(name, x, y + 20);
        }

        function gameLoop() {
            if (gameState.location === 'intro') {
                drawIntro();
            } else if (gameState.location === 'mapa') {
                drawMap();
            } else if (gameState.location === 'migraciones') {
                drawLocation('migraciones', 'GÓMEZ');
            } else if (gameState.location === 'prefectura') {
                drawLocation('prefectura', 'LÓPEZ');
            } else if (gameState.location === 'oficina') {
                drawLocation('oficina', 'MARTINA');
            } else if (gameState.location === 'aduana') {
                drawLocation('aduana', 'RODRÍGUEZ');
            } else if (gameState.location === 'puerto_anp') {
                drawLocation('puerto_anp', 'MARINERO');
            } else if (gameState.location === 'terminal_navios') {
                drawLocation('terminal_navios', 'SUPERVISOR');
            }

            requestAnimationFrame(gameLoop);
        }

        // ============================================================
        // EVENT HANDLERS
        // ============================================================
        canvas.addEventListener('click', (e) => {
            initAudio();

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width * canvas.width;
            const y = (e.clientY - rect.top) / rect.height * canvas.height;

            if (gameState.location === 'intro') {
                gameState.introPhase++;
                if (gameState.introPhase >= 3) {
                    showDialog('monologue');
                }
            } else if (gameState.location === 'mapa') {
                const doors = [
                    { x: canvas.width * 0.15, y: canvas.height * 0.35, loc: 'migraciones' },
                    { x: canvas.width * 0.4, y: canvas.height * 0.35, loc: 'prefectura' },
                    { x: canvas.width * 0.65, y: canvas.height * 0.35, loc: 'oficina' },
                    { x: canvas.width * 0.5, y: canvas.height * 0.55, loc: 'aduana' },
                    { x: canvas.width * 0.1, y: canvas.height * 0.15, loc: 'puerto_anp' },
                    { x: canvas.width * 0.8, y: canvas.height * 0.2, loc: 'terminal_navios' }
                ];

                doors.forEach(d => {
                    if (Math.abs(x - d.x) < 40 && Math.abs(y - d.y) < 50) {
                        goToLocation(d.loc);
                    }
                });
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') {
                location.reload();
            }
        });

        // ============================================================
        // INITIALIZATION
        // ============================================================
        window.addEventListener('load', () => {
            goToLocation('intro');
            gameLoop();
        });

        document.addEventListener('click', initAudio, { once: true });
    </script>
</body>
</html>
